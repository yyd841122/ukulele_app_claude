plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// --- T020_FIX_AGGREGATE_SIGNING_CONFIGURATION ---------------------------
// The release build reads its signing material from `android/key.properties`,
// which is owned by the local developer (never committed). When a release
// task is requested — directly (e.g. `assembleRelease`, `flutter build apk
// --release`) OR indirectly through an aggregate task (e.g. `build`,
// `assemble`, `check`) — and the file is missing, incomplete, or references a
// keystore that does not exist on disk, the build must fail fast with a clear
// message instead of silently falling back to the debug key.
//
// The signing configuration is discovered and validated INDEPENDENTLY of
// `gradle.startParameter.taskNames`. Previously the configuration-phase probe
// was guarded by a CLI-name check, which meant that aggregate tasks such as
// `build` (whose own name does not contain "release" but which depend on
// `assembleRelease`) would never load a valid `key.properties`, leaving the
// release signing config unset and the task-graph guard correctly but
// frustratingly reporting a false-positive missing-config failure.
//
// We now maintain TWO independent state values at script-evaluation time:
//
//   1. `releaseSigningProps` — non-null ONLY when the configuration has been
//      fully and successfully validated. This is the single source of truth
//      for "is a release signing config available right now?".
//
//   2. `releaseSigningError` — a safe, developer-facing description of why
//      the configuration is unavailable. Holds the reason whether the file
//      is missing, malformed, missing required keys, or references a
//      keystore that does not exist on disk. Never contains keystore
//      passwords, the key alias, or any keystore material.
//
// Both guards consult the same state:
//
//   * Configuration-phase guard (direct release request): when `key.properties`
//     is missing or invalid AND the CLI requests a release task, fail with
//     `releaseSigningError` immediately.
//
//   * Execution-phase guard (aggregate task): when the resolved task graph
//     contains a release-artifact task AND `releaseSigningProps` is null,
//     fail with `releaseSigningError` before any task executes.
//
// `buildTypes.release` never references `signingConfigs.debug` anywhere in
// this file. When signing material is present we bind the release build
// type to `signingConfigs.release`; when it is absent we leave the
// build type's `signingConfig` unset. The execution-phase guard then makes
// sure no release task actually runs.
//
// Debug builds (`assembleDebug`, `flutter run`, `flutter test`,
// `flutter analyze`) are unaffected: no probe failure raises during normal
// debug configuration, and `signingConfigs.debug` is created by AGP on its
// own.
//
// In a standard Flutter Android project the Gradle rootProject is the
// `android/` directory itself, so `key.properties` and the keystore sit at
// `<rootProject>/key.properties` and `<rootProject>/<storeFile>` respectively.

// --- Configuration discovery ------------------------------------------------

def androidRootDir = rootProject.projectDir
def propsFile = new File(androidRootDir, "key.properties")

// T020_FIX_RELEASE_SIGNING_ABSOLUTE_STORE_FILE_PATH:
// `key.properties` may legitimately hold an absolute path to a keystore that
// lives OUTSIDE the repository (e.g. `C:/Users/.../.android-keys/upload.jks`
// on Windows, or `/Users/.../.android-keys/upload.jks` on macOS/Linux). It
// may also hold a path relative to the `android/` Gradle root project, which
// is the original `rootProject.projectDir` layout used by T020.
//
// We must therefore:
//   1. trim the value (Windows key.properties files commonly contain `\r`
//      line endings that would otherwise leak into the path);
//   2. detect Windows drive-rooted paths (`^[A-Za-z]:[\\/].*`),
//      Windows UNC paths (`^\\\\.*`), and Unix absolute paths (`^/.*`);
//   3. fall back to `androidRootDir` as the base ONLY for relative paths.
//
// The helper deliberately accepts only `(androidRootDir, storeFilePath)` and
// never sees `storePassword` / `keyPassword` / `keyAlias`, so it can be used
// from error-reporting code paths without ever printing secrets.
def resolveReleaseStoreFile = { File androidRoot, String rawPath ->
    def storeFilePath = (rawPath == null) ? "" : rawPath.toString().trim()
    if (storeFilePath.isEmpty()) {
        return [file: null, isAbsolute: false, originalPath: storeFilePath]
    }
    // Windows drive absolute (e.g. `C:/...` or `C:\...`).
    def isWindowsDrive = storeFilePath ==~ /^[A-Za-z]:[\\/].*/
    // Windows UNC absolute (e.g. `\\server\share\file.jks`).
    def isWindowsUnc = storeFilePath.startsWith("\\\\")
    // Unix absolute (e.g. `/Users/foo/upload.jks`).
    def isUnixAbsolute = storeFilePath.startsWith("/")
    boolean isAbsolute = isWindowsDrive || isWindowsUnc || isUnixAbsolute
    File resolved
    if (isAbsolute) {
        resolved = new File(storeFilePath)
    } else {
        resolved = new File(androidRoot, storeFilePath)
    }
    return [file: resolved.absoluteFile, isAbsolute: isAbsolute, originalPath: storeFilePath]
}

def releaseSigningProps = null
def releaseSigningError = null

if (!propsFile.exists()) {
    // "Configuration missing" state. We DO NOT throw here — debug builds
    // must remain runnable even when no release keystore is configured.
    // The two guards below will surface this state only when a release
    // artifact is actually being produced.
    releaseSigningError = "Android release signing is not configured: " +
            propsFile.path + " is missing. Create the file with the keys " +
            "[storeFile, storePassword, keyAlias, keyPassword] pointing to " +
            "your upload keystore. The file must be kept out of version " +
            "control (see .gitignore)."
} else {
    // File exists — try to read and validate it. Any failure produces a
    // safe error message and leaves `releaseSigningProps` as null.
    def loaded
    try {
        loaded = new Properties()
        propsFile.withInputStream { stream -> loaded.load(stream) }
    } catch (Exception e) {
        releaseSigningError = "Android release signing configuration at " +
                propsFile.path + " could not be parsed: " + e.getClass().getSimpleName() +
                ". Refusing to fall back to debug signing."
    }

    if (loaded != null) {
        def missingKeys = []
        ["storeFile", "storePassword", "keyAlias", "keyPassword"].each { String k ->
            def v = loaded.getProperty(k)
            if (v == null || v.trim().isEmpty()) {
                missingKeys << k
            }
        }
        if (!missingKeys.isEmpty()) {
            // Note: we intentionally name the MISSING key names here (they are
            // not secrets). We never echo the values of any key, including
            // the alias or passwords.
            releaseSigningError = "Android release signing configuration at " +
                    propsFile.path + " is missing required key(s): " +
                    missingKeys.join(", ") +
                    ". Refusing to fall back to debug signing. Provide a " +
                    "non-empty value for each missing key."
        } else {
            def storeFilePath = loaded.getProperty("storeFile")
            def resolved = resolveReleaseStoreFile(androidRootDir, storeFilePath)
            def keystoreFile = resolved.file as File
            if (keystoreFile == null) {
                // Defensive: trimmed value is empty even though the key
                // was reported as present. This branch is currently
                // unreachable because `missingKeys` already catches
                // empty values, but kept for future-proofing.
                releaseSigningError = "Android release signing is requested " +
                        "but the keystore referenced by " + propsFile.path +
                        " (storeFile='" + resolved.originalPath +
                        "') is empty. Refusing to fall back to debug signing."
            } else if (!keystoreFile.exists()) {
                // We mention the configured storeFile path so the developer
                // can locate the offending entry, but we never echo any
                // password or the key alias. Note: `storeFile` in
                // `key.properties` is a path, not a secret, so echoing it
                // is safe and required for diagnostics.
                releaseSigningError = "Android release signing is requested " +
                        "but the keystore referenced by " + propsFile.path +
                        " (storeFile='" + storeFilePath +
                        "', resolved='" + keystoreFile.absolutePath +
                        "') does not exist on disk. Refusing to fall back " +
                        "to debug signing."
            } else {
                releaseSigningProps = loaded
            }
        }
    }
}

// --- Configuration-phase guard (direct release request) -------------------
//
// Even though we now probe independently of the CLI task name, we still need
// a fast failure for the common case where the developer runs
// `assembleRelease` / `bundleRelease` / `flutter build apk --release` and
// the configuration is unavailable. Failing at script-evaluation time keeps
// the error message clear and unrelated to signingConfigs.
def releaseSigningRequestedByCli() {
    def requested = gradle.startParameter.taskNames ?: []
    return requested.any { String name ->
        // Direct invocation: `assembleRelease`, `bundleRelease`, `:app:assembleRelease`, …
        // Case-insensitive to tolerate platform-specific Gradle task casing.
        name.toLowerCase().contains("release")
    }
}

if (releaseSigningRequestedByCli() && releaseSigningProps == null) {
    throw new GradleException(releaseSigningError)
}

android {
    namespace = "com.yupi.ukulele"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.yupi.ukulele"
        // MVP minSdk requirement: 23 (Android 6.0)
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    if (releaseSigningProps != null) {
        // Props have already been validated at script-evaluation time. Reuse
        // the parsed map to wire signingConfigs.release.
        def storeFilePath = releaseSigningProps.getProperty("storeFile")
        // T020_FIX_RELEASE_SIGNING_ABSOLUTE_STORE_FILE_PATH: keep the
        // password/alias values under short, non-conflicting names so that
        // Groovy's `String.metaClass.call` interception (triggered by
        // values containing `@`) cannot shadow the AGP setter dispatch
        // inside the `signingConfigs { release { ... } }` closure.
        def sp = releaseSigningProps.getProperty("storePassword")
        def ka = releaseSigningProps.getProperty("keyAlias")
        def kp = releaseSigningProps.getProperty("keyPassword")

        // T020_FIX_RELEASE_SIGNING_ABSOLUTE_STORE_FILE_PATH: use the same
        // resolver that validated the keystore at script-evaluation time.
        // This keeps Windows drive paths, Windows UNC paths, Unix absolute
        // paths, and `android/`-relative paths consistent between the
        // existence check above and the actual File handed to AGP.
        def resolvedStoreFile = resolveReleaseStoreFile(androidRootDir, storeFilePath).file as File

        signingConfigs {
            release {
                storeFile resolvedStoreFile
                // Explicit method-call syntax with distinct local variable
                // names (`sp` / `ka` / `kp`) prevents Groovy's
                // `String.metaClass.call` interception from shadowing the
                // AGP setter dispatch when the underlying value contains
                // `@`. Without this, evaluation of `android {}` fails on
                // every build (including `assembleDebug`).
                storePassword(sp)
                keyAlias(ka)
                keyPassword(kp)
            }
        }
    }

    buildTypes {
        release {
            // T020_FIX_AGGREGATE_SIGNING_CONFIGURATION: `buildTypes.release`
            // must never reference `signingConfigs.debug`. When signing
            // material has been validated we wire the release build type to
            // the dedicated `signingConfigs.release`. When the material is
            // absent we deliberately leave `signingConfig` unset so AGP does
            // not silently fall back to debug signing for this variant;
            // the execution-phase task-graph guard below ensures we never
            // actually execute any release task in that state.
            if (releaseSigningProps != null) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

// --- Execution-phase guard (aggregate task) ------------------------------
//
// Inspect the resolved task graph for any release-artifact-producing task
// (`assembleRelease`, `bundleRelease`, `packageRelease`). When present, the
// build must have a fully validated release signing configuration; otherwise
// we throw a GradleException using `releaseSigningError` (the SAME safe
// description the configuration-phase guard would have used) before any
// task in the graph executes. This closes the gap where the
// `gradle.startParameter.taskNames` check is bypassed by aggregate tasks
// such as `build`, `assemble`, or `check`, while ALSO ensuring that a
// valid `key.properties` (probed at script-evaluation time) is honored
// for those same aggregate tasks.
gradle.taskGraph.whenReady { taskGraph ->
    def hasReleaseArtifactTask = taskGraph.allTasks.any { task ->
        def name = task.name.toLowerCase()
        return name == "assemblerelease" ||
                name == "bundlerelease" ||
                name == "packagerelease"
    }
    if (hasReleaseArtifactTask && releaseSigningProps == null) {
        // `releaseSigningError` was prepared at script-evaluation time and
        // already strips passwords and the key alias. Re-throw it here so
        // both guards give the developer the same actionable message.
        throw new GradleException(releaseSigningError)
    }
}

flutter {
    source = "../.."
}
